<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Acadify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/general.css" />
    <link rel="stylesheet" href="styles/login.css" />
    <link rel="stylesheet" href="styles/sign-up.css" />
  </head>
  <body>
    <section class="login">
      <div class="login-con">
        <div class="logo"><p>Acadify</p></div>
        <div class="login-details">
          <div class="login-hd">
            <p>Login</p>
          </div>
          <form class="login-inputs">
            <div class="email-input">
              <p>Email</p>
              <input placeholder="username@gmail.com" type="email" />
            </div>
            <div class="email-input">
              <p>Password</p>
              <input placeholder="password" type="password" />
            </div>
            <div class="forgot-p">
              <p><a href="#">Forgot password?</a></p>
            </div>
            <div class="login-button">
              <button class="login-cta"><a href="main.html">Sign in</a></button>
            </div>
          </form>
        </div>
      </div>
      <div class="sign-up-div">
        <div class="sign-up-cta">
          <span>Sign up</span>
        </div>
      </div>
    </section>
    <form class="sign-up-form">
      <!--header-->
      <p class="welcome-msg">Welcome! Let’s get you signed up</p>
      <p class="hder"></p>
      <!-- Name -->
      <div class="label"><p>Name</p></div>
      <div class="form1">
        <input placeholder="Surname" type="text" />
        <input placeholder="First-name" type="text" />
      </div>

      <!-- Email -->
      <div class="label"><p>Email</p></div>
      <input class="email-input" placeholder="you@gmail.com" type="email" />

      <!-- Date -->
      <div class="label"><p>Date of birth</p></div>
      <div class="form4">
        <input placeholder="DD" type="number" min="1" max="31" />
        <input placeholder="MM" type="number" min="1" max="12" />
        <input placeholder="YYYY" type="number" min="1900" max="2026" />
      </div>

      <!-- Gender -->
      <div class="label"><p>Gender</p></div>
      <div class="form5">
        <label class="f-box">
          Female <input type="radio" name="gender" />
        </label>
        <label class="m-box"> Male <input type="radio" name="gender" /> </label>
      </div>

      <!-- Password -->
      <div class="label"><p>Password</p></div>
      <input class="password-input" placeholder="Password" type="password" />

      <!-- Button -->
      <button type="submit" class="submit-cta">Create Account</button>
    </form>
  </body>
</html>
